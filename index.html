<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>by mls <3 </title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Space+Grotesk:wght@300;500&display=swap');

  :root {
    --pink-soft: #ff8fb1;
    --pink-deep: #ff4d6d;
    --brand-red: #ff003c;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #050505;
    color: #fff;
    font-family: "Fira Code", monospace;
    overflow: hidden;
  }

  ::selection {
    background: rgba(255, 0, 60, 0.3);
  }

  #app {
    position: relative;
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #app.clickable { cursor: pointer; }

  .scanline {
    width: 100%;
    height: 100px;
    z-index: 10;
    background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255,255,255,0.02) 50%, rgba(0,0,0,0) 100%);
    opacity: 0.1;
    position: absolute;
    bottom: 100%;
    animation: scanline 10s linear infinite;
    pointer-events: none;
  }

  @keyframes scanline {
    0% { bottom: 100%; }
    100% { bottom: -100px; }
  }

  /* ---------- Console stage ---------- */
  #console-stage {
    width: 100%;
    max-width: 42rem;
    padding: 2rem;
    font-size: 0.95rem;
    color: rgba(255,255,255,0.8);
    transition: opacity 0.4s ease;
  }

  #console-stage.hidden {
    display: none;
  }

  .line {
    display: flex;
    gap: 0.5rem;
  }

  .tag-system { color: rgba(255, 143, 177, 0.6); }

  #status-line {
    height: 1.5rem;
    display: flex;
    gap: 0.5rem;
  }

  #status-value {
    color: #4ade80;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #status-value.show { opacity: 1; }

  #reveal-block {
    padding-top: 2rem;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1.5rem;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  #reveal-block.show {
    opacity: 1;
    transform: translateY(0);
  }

  .intro-line {
    color: rgba(255,255,255,0.4);
    font-style: italic;
  }

  #decrypt-button {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1.5rem;
    border: 1px solid rgba(255, 77, 109, 0.3);
    background: rgba(255, 77, 109, 0.05);
    color: var(--pink-soft);
    font-family: "Fira Code", monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  #decrypt-button:hover {
    background: rgba(255, 77, 109, 0.1);
  }

  #decrypt-button svg {
    transition: transform 0.3s ease;
  }

  #decrypt-button:hover svg {
    transform: rotate(12deg);
  }

  .terminal-cursor {
    border-right: 2px solid var(--pink-deep);
    animation: blink 1s step-end infinite;
    margin-left: 2px;
  }

  @keyframes blink {
    from, to { border-color: transparent; }
    50% { border-color: var(--pink-deep); }
  }

  .hint {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ---------- Reveal stage ---------- */
  #reveal-stage {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #reveal-stage.hidden { display: none; }
  #reveal-stage.show { opacity: 1; }

  #heart-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #decrypted-block {
    position: relative;
    z-index: 20;
    text-align: center;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 1.5s ease, transform 1.5s ease;
  }

  #decrypted-block.show {
    opacity: 1;
    transform: scale(1);
  }

  #decrypted-title {
    color: #ffffff;
    font-size: 1.25rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255, 77, 109, 0.5), 0 0 20px rgba(255, 77, 109, 0.3);
    margin-bottom: 0.5rem;
  }

  #decrypted-name {
    color: #ffffff;
    font-size: 1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin: 0 0 1.5rem;
  }

  .divider {
    width: 3rem;
    height: 1px;
    background: rgba(255, 77, 109, 0.3);
    margin: 0 auto 2rem;
  }

  #re-encrypt {
    background: none;
    border: none;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.2em;
    font-family: "Fira Code", monospace;
    cursor: pointer;
    transition: color 0.3s ease;
  }

  #re-encrypt:hover { color: rgba(255,255,255,0.6); }

  .overlay-text {
    position: absolute;
    font-size: 10px;
    color: rgba(255,255,255,0.1);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    z-index: 20;
  }

  .overlay-top-left {
    top: 2rem;
    left: 2rem;
  }

  .overlay-top-left div { margin-bottom: 0.25rem; }

  .overlay-bottom-right {
    bottom: 2rem;
    right: 2rem;
  }
</style>
</head>
<body>

<div id="app">
  <div class="scanline"></div>

  <!-- ===== Console / intro stage ===== -->
  <div id="console-stage">
    <div class="line">
      <span class="tag-system">[system]</span>
      <span id="typewriter" class="font-mono"></span>
    </div>

    <div id="status-line">
      <span>[status]</span>
      <span id="status-value">READY</span>
    </div>

    <div id="reveal-block">
      <p class="intro-line">&gt; Для вас найдено письмо от mls.</p>

      <button id="decrypt-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        <span>ОТКРЫТЬ ПИСЬМО</span>
        <span class="terminal-cursor"></span>
      </button>

      <p class="hint">Нажми</p>
    </div>
  </div>

  <!-- ===== Reveal stage ===== -->
  <div id="reveal-stage" class="hidden">
    <canvas id="heart-canvas"></canvas>

    <div id="decrypted-block">
      <h2 id="decrypted-title">i love you</h2>
      <p id="decrypted-name">saida</p>
      <div class="divider"></div>
      <button id="re-encrypt">Re-encrypt</button>
    </div>

    <div class="overlay-text overlay-top-left">
      <div>i</div>
      <div>love</div>
      <div>you</div>
    </div>

    <div class="overlay-text overlay-bottom-right">i love you</div>
  </div>
</div>

<script>
  // ---------- Typewriter effect ----------
  const fullText = "by developeer mls...";
  const typewriterEl = document.getElementById('typewriter');
  const statusValueEl = document.getElementById('status-value');
  const revealBlockEl = document.getElementById('reveal-block');
  const appEl = document.getElementById('app');
  const consoleStageEl = document.getElementById('console-stage');
  const revealStageEl = document.getElementById('reveal-stage');
  const decryptedBlockEl = document.getElementById('decrypted-block');

  let charIndex = 0;
  let consoleFinished = false;
  let stage = 'console';

  function typeNextChar() {
    if (charIndex < fullText.length) {
      typewriterEl.textContent += fullText[charIndex];
      charIndex++;
      setTimeout(typeNextChar, 30);
    } else {
      consoleFinished = true;
      statusValueEl.classList.add('show');
      revealBlockEl.classList.add('show');
      appEl.classList.add('clickable');
    }
  }

  setTimeout(typeNextChar, 200);

  // ---------- Stage switching ----------
  function goToReveal() {
    if (stage === 'reveal') return;
    stage = 'reveal';
    consoleStageEl.classList.add('hidden');
    revealStageEl.classList.remove('hidden');
    requestAnimationFrame(() => {
      revealStageEl.classList.add('show');
      setTimeout(() => decryptedBlockEl.classList.add('show'), 50);
    });
    startHeartAnimation();
  }

  function goToConsole() {
    stage = 'console';
    revealStageEl.classList.remove('show');
    decryptedBlockEl.classList.remove('show');
    setTimeout(() => {
      revealStageEl.classList.add('hidden');
      consoleStageEl.classList.remove('hidden');
      stopHeartAnimation();
    }, 400);
  }

  appEl.addEventListener('click', () => {
    if (stage === 'console' && consoleFinished) {
      goToReveal();
    }
  });

  document.getElementById('decrypt-button').addEventListener('click', (e) => {
    e.stopPropagation();
    goToReveal();
  });

  document.getElementById('re-encrypt').addEventListener('click', (e) => {
    e.stopPropagation();
    goToConsole();
  });

  // ---------- Heart canvas animation ----------
  const canvas = document.getElementById('heart-canvas');
  const ctx = canvas.getContext('2d');
  const text = "i love you";
  const fontSize = 14;
  let points = [];
  let animationFrameId = null;
  let startTime = null;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initPoints();
  }

  function initPoints() {
    points = [];
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const scale = Math.min(canvas.width, canvas.height) / 45;

    // Outer heart outline
    for (let t = 0; t < Math.PI * 2; t += 0.05) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

      points.push({
        x: centerX + x * scale,
        y: centerY + y * scale,
        alpha: 0,
        targetAlpha: 0.8 + Math.random() * 0.2,
        delay: Math.random() * 2000
      });
    }

    // Inner layers
    for (let s = 0.2; s < 1; s += 0.2) {
      for (let t = 0; t < Math.PI * 2; t += 0.1) {
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

        points.push({
          x: centerX + x * scale * s,
          y: centerY + y * scale * s,
          alpha: 0,
          targetAlpha: 0.4 + Math.random() * 0.4,
          delay: Math.random() * 3000
        });
      }
    }
  }

  function draw(time) {
    if (!startTime) startTime = time;
    const elapsed = time - startTime;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.font = `${fontSize}px "Fira Code", monospace`;

    points.forEach(p => {
      if (elapsed > p.delay) {
        p.alpha += (p.targetAlpha - p.alpha) * 0.02;
      }
      ctx.fillStyle = `rgba(255, 77, 109, ${p.alpha})`;
      ctx.fillText(text, p.x - ctx.measureText(text).width / 2, p.y);
    });

    animationFrameId = requestAnimationFrame(draw);
  }

  function startHeartAnimation() {
    startTime = null;
    resizeCanvas();
    if (!animationFrameId) {
      animationFrameId = requestAnimationFrame(draw);
    }
  }

  function stopHeartAnimation() {
    if (animationFrameId) {
      cancelAnimationFrame(animationFrameId);
      animationFrameId = null;
    }
  }

  window.addEventListener('resize', () => {
    if (stage === 'reveal') resizeCanvas();
  });
</script>

</body>
</html>
